plugins {
    id 'com.android.application'
}

android {
    namespace 'ru.ogonek.screen'
    compileSdk 34

    defaultConfig {
        applicationId "ru.ogonek.screen"
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release { minifyEnabled false }
        debug {}
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {}
