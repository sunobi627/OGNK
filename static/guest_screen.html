<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Огонёк — Добро пожаловать</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; height: 100vh; overflow: hidden; color: white; }

  .bg-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; opacity: 0; transition: opacity 1.5s ease; }
  .bg-video.loaded { opacity: 1; }

  .bg-image { position: fixed; inset: 0; background-size: cover; background-position: center; z-index: 0; opacity: 0; transition: opacity 1.5s ease; }
  .bg-image.loaded { opacity: 1; }

  .overlay { position: fixed; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.05) 40%, rgba(0,0,0,0.55) 70%, rgba(0,0,0,0.85) 100%); z-index: 1; }

  /* Погода — правый нижний угол */
  .weather { position: fixed; bottom: 44px; right: 48px; z-index: 2; display: flex; gap: 16px; align-items: stretch; }
  .weather-day { text-align: center; background: rgba(0,0,0,0.25); backdrop-filter: blur(10px); border-radius: 16px; padding: 14px 20px; width: 92px; }
  .weather-label { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; opacity: 0.45; margin-bottom: 6px; white-space: nowrap; }
  .weather-icon { font-size: 32px; line-height: 1; margin-bottom: 4px; }
  .weather-temp { font-size: 22px; font-weight: 600; }
  .weather-range { font-size: 12px; opacity: 0.5; margin-top: 2px; }
  .weather-desc { font-size: 11px; opacity: 0.55; margin-top: 4px; line-height: 1.3; }

  /* Гость — левый нижний угол */
  .info { position: fixed; bottom: 0; left: 0; right: 0; z-index: 2; padding: 32px 48px 44px; }
  .property { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.5; margin-bottom: 8px; }
  .greeting { font-size: 18px; font-weight: 300; opacity: 0.75; }
  .guest-name { font-size: 52px; font-weight: 700; line-height: 1.1; letter-spacing: -1px; margin-bottom: 20px; }
  .dates { display: flex; gap: 24px; margin-bottom: 20px; }
  .date-item { display: flex; flex-direction: column; gap: 2px; }
  .date-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.45; }
  .date-value { font-size: 20px; font-weight: 500; }
  .date-sep { align-self: center; opacity: 0.3; font-size: 20px; margin-top: 14px; }
  .phone { font-size: 14px; opacity: 0.45; }
  .phone span { color: #ffd700; font-weight: 500; }

  .no-guest { position: fixed; inset: 0; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
  .no-guest .logo { font-size: 56px; }
  .no-guest .prop { font-size: 12px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.4; }
  .no-guest .name { font-size: 22px; opacity: 0.6; margin-top: 8px; }
  .no-guest .empty { font-size: 14px; opacity: 0.3; }

  .loading { position: fixed; inset: 0; z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 15px; opacity: 0.4; }
</style>
</head>
<body>

<video class="bg-video" id="bgVideo" autoplay muted loop playsinline></video>
<div class="bg-image" id="bgImage"></div>
<div class="overlay"></div>
<div id="weather"></div>
<div id="content"><div class="loading">Загрузка...</div></div>

<script>
const cottageId = location.pathname.split('/').pop() || 1;

// Координаты Дмитровского района Подмосковья
const WEATHER_URL = 'https://api.open-meteo.com/v1/forecast' +
  '?latitude=56.34&longitude=37.52' +
  '&daily=temperature_2m_max,temperature_2m_min,weathercode' +
  '&timezone=Europe%2FMoscow&forecast_days=3';

function weatherIcon(code) {
  if (code === 0)                        return '☀️';
  if (code === 1)                        return '🌤️';
  if (code === 2)                        return '⛅';
  if (code === 3)                        return '☁️';
  if ([45,48].includes(code))            return '🌫️';
  if ([51,53,55].includes(code))         return '🌦️';
  if ([61,63,65].includes(code))         return '🌧️';
  if ([66,67].includes(code))            return '🌨️';
  if ([71,73,75,77].includes(code))      return '❄️';
  if ([80,81,82].includes(code))         return '🌦️';
  if ([85,86].includes(code))            return '🌨️';
  if ([95,96,99].includes(code))         return '⛈️';
  return '🌡️';
}

function weatherDesc(code) {
  if (code === 0)                        return 'Ясно';
  if (code === 1)                        return 'Преим. ясно';
  if (code === 2)                        return 'Переменная\nоблачность';
  if (code === 3)                        return 'Пасмурно';
  if ([45,48].includes(code))            return 'Туман';
  if ([51,53,55].includes(code))         return 'Морось';
  if ([61,63,65].includes(code))         return 'Дождь';
  if ([66,67].includes(code))            return 'Ледяной дождь';
  if ([71,73,75,77].includes(code))      return 'Снег';
  if ([80,81,82].includes(code))         return 'Ливень';
  if ([85,86].includes(code))            return 'Снегопад';
  if ([95,96,99].includes(code))         return 'Гроза';
  return '';
}

async function loadWeather() {
  try {
    const res  = await fetch(WEATHER_URL);
    const data = await res.json();
    const d    = data.daily;

    const days = [
      { label: 'Сегодня',       i: 0 },
      { label: 'Завтра',        i: 1 },
      { label: 'Посл. завтра',   i: 2 }
    ];

    const html = days.map(({ label, i }) => {
      const max  = Math.round(d.temperature_2m_max[i]);
      const min  = Math.round(d.temperature_2m_min[i]);
      const code = d.weathercode[i];
      const avg  = Math.round((max + min) / 2);
      const sign = avg >= 0 ? '+' : '';
      return `
        <div class="weather-day">
          <div class="weather-label">${label}</div>
          <div class="weather-icon">${weatherIcon(code)}</div>
          <div class="weather-temp">${sign}${avg}°</div>
          <div class="weather-range">${min > 0 ? '+' : ''}${min}° / ${max > 0 ? '+' : ''}${max}°</div>
          <div class="weather-desc">${weatherDesc(code)}</div>
        </div>`;
    }).join('');

    document.getElementById('weather').innerHTML =
      `<div class="weather">${html}</div>`;
  } catch(e) {
    // Погода не загрузилась — ничего не показываем, не критично
  }
}

async function loadAll() {
  try {
    const [sRes, gRes] = await Promise.all([
      fetch('/api/settings'),
      fetch(`/api/cottage/${cottageId}/current-guest`)
    ]);
    const settings = await sRes.json();
    const guest    = await gRes.json();
    applyBackground(settings);
    render(guest, settings);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="loading">Ошибка загрузки</div>';
  }
}

function applyBackground(s) {
  const vid = document.getElementById('bgVideo');
  const img = document.getElementById('bgImage');
  if (s.background_type === 'image') {
    vid.style.display = 'none';
    img.style.backgroundImage = `url('${s.background_src}')`;
    img.classList.add('loaded');
  } else {
    img.style.display = 'none';
    if (vid.src !== s.background_src) vid.src = s.background_src;
    vid.oncanplay = () => vid.classList.add('loaded');
  }
}

function fmt(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  return `${day}.${m}.${y}`;
}

function render(d, s) {
  const el = document.getElementById('content');
  const propName = s.property_name || d.property_name || 'OGONËK';
  const greeting = s.greeting_text || d.greeting_text || 'Добро пожаловать,';
  const phone    = s.support_phone  || d.phone || '';

  if (!d.has_guest) {
    el.innerHTML = `
      <div class="no-guest">
        <div class="logo">🔥</div>
        <div class="prop">${propName}</div>
        <div class="name">${d.cottage_name}</div>
        <div class="empty">Свободно</div>
      </div>`;
    return;
  }

  el.innerHTML = `
    <div class="info">
      <div class="property">OGON&#203;K</div>
      <div class="greeting">${greeting}</div>
      <div class="guest-name">${d.guest_name}</div>
      <div class="dates">
        <div class="date-item">
          <div class="date-label">Заезд</div>
          <div class="date-value">${fmt(d.checkin)}</div>
        </div>
        <div class="date-sep">→</div>
        <div class="date-item">
          <div class="date-label">Выезд</div>
          <div class="date-value">${fmt(d.checkout)}</div>
        </div>
      </div>
      <div class="phone">Нужна помощь? <span>${phone}</span></div>
    </div>`;
}

// Загружаем всё параллельно
loadAll();
loadWeather();

// Обновляем гостя каждую минуту, погоду каждые 30 минут
setInterval(loadAll, 60000);
setInterval(loadWeather, 30 * 60 * 1000);
</script>
</body>
</html>
